name: adr_mark_superseded
description: Mark an ADR as superseded by a newer ADR
inputSchema:
  type: object
  additionalProperties: false
  properties:
    adr_id:
      type: string
      description: ADR ID being superseded (e.g. "adr-001")
    superseded_by:
      type: string
      description: ID of the new ADR that replaces this one (e.g. "adr-005")
  required: [adr_id, superseded_by]

name: adr_mark_deprecated
description: Mark an ADR as deprecated — it no longer applies but is kept for history
inputSchema:
  type: object
  additionalProperties: false
  properties:
    adr_id:
      type: string
      description: ADR ID to deprecate (e.g. "adr-001")
    reason:
      type: string
      description: Brief reason for deprecation
  required: [adr_id]
